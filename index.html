            }

            @font-face {
                font-family: "Merriweather Fallback";
                font-display: swap;
                src: local("Arial");
                ascent-override: 98.4%;
                descent-override: 27.3%;
            }

            @font-face {
                font-family: "Merriweather Fallback Android";
                font-display: swap;
                src: local("Roboto");
                ascent-override: 98.4%;
                descent-override: 27.3%;
            }

            :root {
                font-size: 100%;
                /* Light mode (default fallback) */
                --bg: #f5efe0;
                --card: #dcd3ca;
                --live: #ffc7c4;
                --header: #c1052c;
                --text: #003592;
                /* --header: #d30731;
                --text: #0045b7; */
                background-color: var(--bg);
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #050404;
                    --card: #514d4a;
                    --live: #684442;
                    --header: #ffaca9;
                    --text: #c6dbff;
                    /* --header: #ffa19e;
                    --text: #b5d0ff; */

                    /* --bg-old: #3d3b36;
                    --card-old: #66625d;
                    --live-old: #7f5956;
                    --header-old: #ffc0bc;
                    --text-old: #d9e8ff; */
                    /* --header-old: #ffb6b2;
                    --text-old: #c8ddff; */
                    background-color: var(--bg);
                }
            }

            body {
                font-family:
                    "Merriweather",
                    "Merriweather Fallback",
                    "Merriweather Fallback Android",
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                font-size: 20px;
                background: var(--bg);
                color: var(--text);
            }

            .container {
                min-width: auto;
                max-width: 59.25rem;
                margin: 0 auto;
            }

            .container .day h2 {
                color: var(--header);
                margin-block-end: 0.309cap;
                font-size: 30px;
                transition:
                    margin 0.382s ease,
                    font-size 0.382s ease,
                    opacity 0.382s ease;
            }

            .container .day.past h2 {
                opacity: 0.618;
                margin-block-end: 0.2575cap;
                font-size: 25px;
            }

            .container .day .event {
                padding: 1cap 1em;
                margin: 0.618cap 0;
                border: 0px solid transparent;
                border-radius: 19px;
                corner-shape: superellipse(2.131);
                background: var(--card);
                transition:
                    opacity 0.382s ease,
                    background-color 0.382s ease,
                    border-color 0.382s ease,
                    border-width 0.382s ease,
                    padding 0.382s ease,
                    margin 0.382s ease;
            }

            .container .day .event.past {
                padding: 0.5cap 0.5em;
                margin: 0.309cap 0;
                border-radius: 9.5px;
                opacity: 0.618;
            }

            @supports (corner-shape: superellipse(2.131)) {
                .container .day .event,
                .container .day .event.past,
                .container .day .event .time.skeleton {
                    border-radius: 6lh;
                }
            }

            .container .day .event.past .time {
                font-style: italic;
            }

            .container .day .event .time {
                position: relative;
                unicode-bidi: plaintext;
                transition: opacity 0.382s ease;
            }

            .container .day .event.live {
                background: var(--live);
                border: 0.309ex solid var(--header);
            }

            .container .day .event.live .title .dot {
                display: inline-flex;
                width: 1ex;
                height: 1ex;
                vertical-align: bottom;
                margin-block-end: 0.5cap;
                margin-inline-end: 0.618ex;
                background: var(--header);
                border-radius: 50%;
                position: relative;
            }

            .container .day .event.live .title .dot::after {
                content: "";
                position: absolute;
                inset: 0;
                background: inherit;
                border-radius: 50%;
                will-change: transform, opacity;
                animation: pulse 3.82s infinite 1.46s;
            }

            @keyframes pulse {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }

                61.8% {
                    transform: scale(2.618);
                    opacity: 0;
                }

                100% {
                    transform: scale(2.618);
                    opacity: 0;
                }
            }

            .container .day .event .title .countdown {
                color: var(--header);
                font-style: italic;
                font-weight: bold;
            }

            .container .day .event .time .duration {
                color: var(--header);
                font-style: italic;
            }

            .container .day .event .time::before {
                opacity: 0;
                z-index: -1;
                content: "";
                position: absolute;
                inset: 0;
                /* display: block;
                width: 11ch;
                height: calc(1cap + (1lh - 1cap) / 2);
                margin-block-start: calc((1lh - 1cap) / 2); */
                border-radius: 5px;
                corner-shape: superellipse(2.131);
                /* background-image: linear-gradient(
                    90deg,
                    var(--card),
                    var(--bg),
                    var(--card),
                    var(--bg),
                    var(--card)
                ); */
                background-image: linear-gradient(
                    90deg,
                    transparent,
                    rgb(from var(--bg) r g b / 0.382),
                    transparent,
                    rgb(from var(--bg) r g b / 0.382),
                    transparent
                );
                background-size: 400% 100%;
                animation: shimmer 3.82s ease-in-out infinite;
                transition: opacity 0.382s ease;
            }

            .container .day .event .time:dir(rtl)::before {
                animation: shimmer-rtl 3.82s ease-in-out infinite;
            }

            /* .container .day .event.live .time::before { */
            /* background-image: linear-gradient(
                    90deg,
                    var(--live),
                    var(--bg),
                    var(--live),
                    var(--bg),
                    var(--live)
                ); */
            /* background-image: linear-gradient(
                    90deg,
                    transparent,
                    rgb(from var(--bg) r g b / 0.382),
                    transparent,
                    rgb(from var(--bg) r g b / 0.382),
                    transparent
                );
            } */

            .container .day .event .time.skeleton {
                opacity: 0.618;
            }

            .container .day .event .time.skeleton::before {
                opacity: 1;
            }

            @keyframes shimmer {
                0% {
                    background-position: 0% 0;
                }

                100% {
                    background-position: -200% 0;
                }
            }

            @keyframes shimmer-rtl {
                0% {
                    background-position: 0% 0;
                }

                100% {
                    background-position: 200% 0;
                }
            }
        </style>
