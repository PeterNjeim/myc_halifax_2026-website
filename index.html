<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="MYC Halifax 2026 event schedule" />
        <link

            sizes="96x96"
        />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1" />
        <link rel="shortcut icon" href="/favicon.ico?v=1" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png?v=1"
        />
        <meta name="apple-mobile-web-app-title" content="MYC Halifax" />
        <link rel="manifest" href="/site.webmanifest?v=1" />
        <link rel="preconnect" href="https://opensheet.elk.sh" />
        <link
            rel="preload"
            href="https://opensheet.elk.sh/1SFHHPSp4IFyQn2yODDC5XrIKQuutYc4XK2KTED4kQ8g/schedule"
            as="fetch"
            crossorigin="anonymous"
        />
        <link
            rel="preload"
            href="/src/assets/fonts/Merriweather-Italic.woff2"
            as="font"
            type="font/woff2"
            crossorigin="anonymous"
        />
        <link
            rel="preload"
            href="/src/assets/fonts/Merriweather-Regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin="anonymous"
        />
        <style>
            @font-face {
                font-family: "Merriweather";
                font-style: italic;
                font-weight: 400;
                font-display: swap;
                src: url(/src/assets/fonts/Merriweather-Italic.woff2)
                    format("woff2");
                unicode-range:
                    U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
                    U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC,
                    U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }

            @font-face {
                font-family: "Merriweather";
                font-style: italic;
                font-weight: 700;
                font-display: swap;
                src: url(/src/assets/fonts/Merriweather-Italic.woff2)
                    format("woff2");
                unicode-range:
                    U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
                    U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC,
                    U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }

            @font-face {
                font-family: "Merriweather";
                font-style: normal;
                font-weight: 400;
                font-display: swap;
                src: url(/src/assets/fonts/Merriweather-Regular.woff2)
                    format("woff2");
                unicode-range:
                    U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
                    U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC,
                    U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }

            @font-face {
                font-family: "Merriweather";
                font-style: normal;
                font-weight: 700;
                font-display: swap;
                src: url(/src/assets/fonts/Merriweather-Regular.woff2)
                    format("woff2");
                unicode-range:
                    U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
                    U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC,
                    U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }

            @font-face {
                font-family: "Merriweather Fallback";
                font-display: swap;
                src: local("Arial");
                ascent-override: 98.4%;
                descent-override: 27.3%;
            }

            @font-face {
                font-family: "Merriweather Fallback Android";
                font-display: swap;
                src: local("Roboto");
                ascent-override: 98.4%;
                descent-override: 27.3%;
            }

            :root {
                font-size: 100%;
                /* Light mode (default fallback) */
                --bg: #f5efe0;
                --card: #dcd3ca;
                --live: #ffc7c4;
                --header: #c1052c;
                --text: #003592;
                /* --header-old: #d30731;
                --text-old: #0045b7; */
                background-color: var(--bg);
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #3d3b36;
                    --card: #66625d;
                    --live: #7f5956;
                    --header: #ffc0bc;
                    --text: #d9e8ff;
                    /* --header-old: #ffb6b2;
                    --text-old: #c8ddff; */
                    background-color: var(--bg);
                }
            }

            body {
                font-family:
                    "Merriweather",
                    "Merriweather Fallback",
                    "Merriweather Fallback Android",
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                font-size: 20px;
                background: var(--bg);
                color: var(--text);
            }

            .container {
                min-width: auto;
                max-width: 59.25rem;
                margin: 0 auto;
            }

            .day h2 {
                color: var(--header);
                margin-block-end: 0.309cap;
                font-size: 30px;
            }

            .day.past h2 {
                opacity: 0.618;
                margin-block-end: 0.2414cap;
                font-size: 25px;
            }

            .event {
                padding: 1cap 1em;
                margin: 0.618cap 0;
                border-radius: 19px;
                corner-shape: superellipse(2.131);
                background: var(--card);
                transition:
                    background 0.382s ease,
                    opacity 0.382s ease,
                    transform 0.382s ease,
                    border-radius 0.382s ease;
                will-change: opacity;
            }

            .event.past {
                padding: 0.5cap 0.5em;
                margin: 0.309cap 0;
                border-radius: 9.5px;
                opacity: 0.618;
            }

            @supports (corner-shape: superellipse(2.131)) {
                .event,
                .event.past {
                    border-radius: 6em;
                }
            }

            .event.past .time {
                font-style: italic;
            }

            .event .time {
                unicode-bidi: plaintext;
            }

            .event.live {
                background: var(--live);
                border: 0.309ex solid var(--header);
            }

            .dot {
                display: inline-flex;
                width: 1ex;
                height: 1ex;
                vertical-align: bottom;
                margin-block-end: 0.5cap;
                margin-inline-end: 0.618ex;
                background: var(--header);
                border-radius: 50%;
                position: relative;
            }

            .dot::after {
                content: "";
                position: absolute;
                inset: 0;
                background: inherit;
                border-radius: 50%;
                will-change: transform, opacity;
                animation: pulse 6.18s infinite;
            }

            @keyframes pulse {
                0% {
                    transform: scale(0);
                    opacity: 1;
                }

                23.6% {
                    transform: scale(1);
                    opacity: 1;
                }

                61.8% {
                    transform: scale(2.618);
                    opacity: 0;
                }

                100% {
                    transform: scale(2.618);
                    opacity: 0;
                }
            }

            .countdown {
                color: var(--header);
                font-style: italic;
                font-weight: bold;
            }
        </style>
        <title>Event Schedule | MYC Halifax 2026</title>
    </head>
    <body>
        <main role="main">
            <noscript>You need to enable JavaScript to run this app.</noscript>
            <div id="root"></div>

            <script src="/src/index.tsx" type="module"></script>
        </main>
    </body>
</html>
