        <style>
            @font-face {
                font-family: "Merriweather";
                font-style: italic;
                font-weight: 400 700;
                font-display: swap;
                src: url(/src/assets/fonts/Merriweather-Italic.woff2)
                    format("woff2");
                unicode-range:
                    U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
                    U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC,
                    U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }

            @font-face {
                font-family: "Merriweather";
                font-style: normal;
                font-weight: 400 700;
                font-display: swap;
                src: url(/src/assets/fonts/Merriweather-Regular.woff2)
                    format("woff2");
                unicode-range:
                    U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
                    U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC,
                    U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }

            @font-face {
                font-family: "Merriweather Fallback";
                font-display: swap;
                src: local("Arial");
                ascent-override: 98.4%;
                descent-override: 27.3%;
            }

            @font-face {
                font-family: "Merriweather Fallback Android";
                font-display: swap;
                src: local("Roboto");
                ascent-override: 98.4%;
                descent-override: 27.3%;
            }

            :root {
                font-size: 100%;
                /* Light mode (default fallback) */
                --bg: #f5efe0;
                --card: #dcd3ca;
                --live: #ffc7c4;
                --header: #c1052c;
                --text: #003592;
                /* --header: #d30731;
                --text: #0045b7; */
                background-color: var(--bg);
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #050404;
                    --card: #514d4a;
                    --live: #684442;
                    --header: #ffaca9;
                    --text: #c6dbff;
                    /* --header: #ffa19e;
                    --text: #b5d0ff; */

                    /* --bg-old: #3d3b36;
                    --card-old: #66625d;
                    --live-old: #7f5956;
                    --header-old: #ffc0bc;
                    --text-old: #d9e8ff; */
                    /* --header-old: #ffb6b2;
                    --text-old: #c8ddff; */
                    background-color: var(--bg);
                }
            }

            body {
                font-family:
                    "Merriweather",
                    "Merriweather Fallback",
                    "Merriweather Fallback Android",
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                font-size: 20px;
                background: var(--bg);
                color: var(--text);
            }

            .container {
                min-width: auto;
                max-width: 59.25rem;
                margin: 0 auto;
            }

            .header {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 1.618ch;
                transition: gap 0.382s ease;
            }

            .header img {
                font-size: 2em;
                height: 1.618lh;
                width: 1.6064lh;
                transition: font-size 0.382s ease;
            }

            .header h1 {
                margin: 0;
                transition: font-size 0.382s ease;
            }

            @media (min-height: 441px) {
                @media (max-width: 1088px) {
                    .day:nth-last-child(1 of .day) {
                        margin-block-end: 4.70141cap;
                    }
                }
            }

            @media (max-width: 410px) {
                .header h1 {
                    max-width: min-content;
                }
            }

            .day h2 {
                color: var(--header);
                margin-block-end: 0.309cap;
                font-size: 30px;
                transition:
                    margin 0.382s ease,
                    font-size 0.382s ease,
                    opacity 0.382s ease;
            }

            .day.past h2 {
                opacity: 0.618;
                margin-block-end: 0.2575cap;
                font-size: 25px;
            }

            .event {
                padding: 1cap 1em;
                margin: 0.618cap 0;
                border: 0px solid transparent;
                border-radius: 19px;
                corner-shape: superellipse(2.131);
                background: var(--card);
                transition:
                    opacity 0.382s ease,
                    background-color 0.382s ease,
                    border-color 0.382s ease,
                    border-width 0.382s ease,
                    padding 0.382s ease,
                    margin 0.382s ease;
            }

            @media (max-height: 440px) {
                .header {
                    gap: 1.309ch;
                }
                .header img {
                    font-size: 1.618em;
                }
                .header h1 {
                    font-size: 1.618em;
                }
                .day h2 {
                    margin-block-end: 0.2575cap;
                    font-size: 25px;
                }
                @media (max-width: 1079px) {
                    .day:nth-last-child(1 of .day) {
                        margin-block-end: 4.39241cap;
                    }
                }
                .event {
                    padding: 0.5cap 0.5em;
                    margin: 0.309cap 0;
                    border-radius: 9.5px;
                }
            }

            .event.past {
                padding: 0.5cap 0.5em;
                margin: 0.309cap 0;
                border-radius: 9.5px;
                opacity: 0.618;
            }

            @supports (corner-shape: superellipse(2.131)) {
                .event,
                .time.skeleton,
                .countdown.skeleton,
                .location.skeleton {
                    border-radius: 6lh;
                }
            }

            .event.past .time {
                font-style: italic;
            }

            .title,
            .details {
                white-space: nowrap;
            }

            .title {
                display: inline-block;
            }

            .details {
                display: flex;
                justify-content: space-between;
            }

            .time,
            .countdown,
            .location {
                position: relative;
                unicode-bidi: plaintext;
                transition:
                    opacity 0.382s ease,
                    color 0.382s ease;
            }

            .event.live {
                background: var(--live);
                border: 0.309ex solid var(--header);
            }

            .dot {
                display: inline-flex;
                width: 1ex;
                height: 1ex;
                vertical-align: bottom;
                margin-block-end: 0.5cap;
                margin-inline-end: 0.618ex;
                background: var(--header);
                border-radius: 50%;
                position: relative;
            }

            .dot::after {
                content: "";
                position: absolute;
                inset: 0;
                background: inherit;
                border-radius: 50%;
                will-change: transform, opacity;
                animation: dot 3.82s infinite 1.46s;
            }

            @keyframes dot {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }

                61.8% {
                    transform: scale(2.618);
                    opacity: 0;
                }

                100% {
                    transform: scale(2.618);
                    opacity: 0;
                }
            }

            .location {
                color: var(--header);
                font-style: italic;
                margin-inline-start: 0.618ex;
            }

            .countdown {
                color: var(--header);
                font-style: italic;
                font-weight: bold;
            }

            .duration {
                color: var(--header);
                font-style: italic;
            }

            .time.timeout,
            .countdown.timeout,
            .location.timeout {
                opacity: 0.618;
                font-style: italic;
                color: var(--header);
                animation: pulse 1.618s ease-in-out 1;
            }

            .time.updated,
            .countdown.updated,
            .location.updated {
                animation: pulse 1.618s ease-in-out 1;
            }

            @keyframes pulse {
                0%,
                100% {
                    filter: opacity(1);
                }

                38.2%,
                61.8% {
                    filter: opacity(0.382);
                }
            }

            .jump-hitbox {
                position: fixed;
                bottom: 0;
                right: 0;
                width: 5.545cap;
                height: 5.545cap;
                cursor: default;
            }

            .jump {
                display: flex;
                justify-content: center;
                position: fixed;
                bottom: 1.618cap;
                right: 1.618cap;
                width: 2.618cap;
                height: 2.618cap;
                border-radius: 50%;
                background: var(--live);
                border: 0.309ex solid var(--header);
                font-size: 20px;
                padding: 0;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
            }

            .jump.upcoming {
                background: var(--bg);
                border: 0.309ex solid var(--card);
            }

            .jump:has(.up) {
                align-items: flex-end;
            }

            .jump:has(.down) {
                align-items: flex-start;
            }

            .jump .up,
            .jump .down {
                display: inline-block;
                border-left: 0.477ex solid var(--text);
                border-top: 0.477ex solid var(--text);
                width: 1.995ex;
                height: 1.995ex;
            }

            .jump .up {
                transform: rotate(45deg) scale(0.6478);
            }

            .jump .down {
                transform: rotate(225deg) scale(0.6478);
            }

            .jumps-enter {
                opacity: 0;
                transform: translateY(1.618cap);
            }

            .jumps-enter-active {
                transition:
                    opacity 0.382s ease,
                    transform 0.382s ease;
            }

            .jumps-exit-active {
                opacity: 0;
                transform: translateY(1.618cap);
                transition:
                    opacity 0.382s ease,
                    transform 0.382s ease;
            }
        </style>
        <title>Event Schedule | MYC Halifax 2026</title>
    </head>

            <div id="root"></div>

        </main>
    </body>
</html>
